name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            arch: aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            arch: x86_64
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      - name: Write App Store Connect API key
        run: |
          KEY_DIR="${{ runner.temp }}/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_FILE="$KEY_DIR/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
          {
            echo "-----BEGIN PRIVATE KEY-----"
            echo "${{ secrets.APPLE_API_PRIVATE_KEY }}"
            echo "-----END PRIVATE KEY-----"
          } > "$KEY_FILE"
          echo "KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Verify API key file
        run: |
          echo "Key file path: $KEY_PATH"
          echo "Key file exists: $(test -f "$KEY_PATH" && echo yes || echo no)"
          echo "Key file size: $(wc -c < "$KEY_PATH") bytes"
          echo "Key file starts with: $(head -c 30 "$KEY_PATH")"

      - name: Build and sign (without notarization)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: ${{ matrix.args }}

      - name: Notarize app
        run: |
          APP_PATH="src-tauri/target/${{ matrix.arch }}-apple-darwin/release/bundle/macos/Agent Orchestrator.app"
          echo "Notarizing: $APP_PATH"

          # Create zip for notarization
          ZIP_PATH="${{ runner.temp }}/Agent_Orchestrator.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          # Submit for notarization
          xcrun notarytool submit "$ZIP_PATH" \
            --key "$KEY_PATH" \
            --key-id "${{ secrets.APPLE_API_KEY }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER }}" \
            --wait --timeout 600

          # Staple the notarization ticket
          xcrun stapler staple "$APP_PATH"

      - name: Re-create DMG with notarized app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.arch }}"
          APP_PATH="src-tauri/target/${{ matrix.arch }}-apple-darwin/release/bundle/macos/Agent Orchestrator.app"
          DEST="AgentOrchestrator-v${VERSION}-${ARCH}.dmg"

          # Create a fresh DMG from the notarized+stapled .app
          hdiutil create -volname "Agent Orchestrator" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DEST"

          echo "DMG_PATH=$DEST" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: ${{ env.DMG_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download aarch64 DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg-aarch64

      - name: Download x86_64 DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg-x86_64

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See the assets below to download and install Agent Orchestrator."
          gh release upload "$TAG" AgentOrchestrator-v*-aarch64.dmg AgentOrchestrator-v*-x86_64.dmg

  update-homebrew:
    needs: release
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Download DMGs from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release download "$TAG" --pattern '*.dmg'

      - name: Compute SHA256s and update cask formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          AARCH64_SHA=$(shasum -a 256 "AgentOrchestrator-v${VERSION}-aarch64.dmg" | awk '{print $1}')
          X86_64_SHA=$(shasum -a 256 "AgentOrchestrator-v${VERSION}-x86_64.dmg" | awk '{print $1}')

          git clone "https://x-access-token:${GH_TOKEN}@github.com/stantonSB/homebrew-agent-orchestrator.git" tap
          cd tap

          python3 -c "
          import re
          content = open('Casks/agent-orchestrator.rb').read()
          content = re.sub(r'version \"[^\"]+\"', 'version \"${VERSION}\"', content, count=1)
          # Replace first sha256 (on_arm block) and second sha256 (on_intel block)
          # Matches both 64-char hex hashes and placeholder strings like AARCH64_SHA256
          shas = ['${AARCH64_SHA}', '${X86_64_SHA}']
          i = [0]
          def replacer(m):
              result = f'sha256 \"{shas[i[0]]}\"'
              i[0] += 1
              return result
          content = re.sub(r'sha256 \"[^\"]+\"', replacer, content)
          open('Casks/agent-orchestrator.rb', 'w').write(content)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/agent-orchestrator.rb
          git commit -m "Update agent-orchestrator to v${VERSION}"
          git push
